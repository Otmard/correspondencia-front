<div class="dashboard fadein animation-duration-1000">
  <div class="sidebar">
    <div class="logo"></div>
    <ul class="menu">
      <li>
        <a routerLink="/admin">
          <i class="fas fa-house"></i>
          <span>Inicio</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="entrante">
          <i class="fas fa-inbox"></i>
          <span>Entrante</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="pendiente">
          <i class="fas fa-business-time"></i>
          <span>Pendientes</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="enviado">
          <i class="fas fa-check"></i>
          <span>Enviados</span>
        </a>
      </li>
      <li routerLinkActive="active">
        <a routerLink="archivo">
          <i class="fas fa-box-archive"></i>
          <span>Archivo</span>
        </a>
      </li>
      <li>
        <a routerLink="profile">
          <i class="fas fa-user"></i>
          <span>Perfil</span>
        </a>
      </li>
      <li routerLink="/" class="logout">
        <a href="#">
          <i class="fas fa-sign-out-alt"></i>
          <span>Cerrar Sesion</span>
        </a>
      </li>
    </ul>
  </div>
  
  <div class="flex flex-column overflow-hidden main_content">
    <div class="header_wrapper">
      <div class="header_title">
        <span>SICOFE</span>
        <h2>Dashboard</h2>
      </div>
      <div class="user_info">
        <div class="search_box">
          <i class="fa-solid fa-search"></i>
          <input type="text" class="text" placeholder="Buscar" />
        </div>
        <img
          src="https://cdn.costumewall.com/wp-content/uploads/2023/03/young-michael-scott.jpg"
          alt=""
        />
      </div>
    </div>
    <div
      class="card_container mb-3"
      [ngClass]="{ hidden: this.router.url != '/admin' }"
    >
      <h3 class="main_title">Correspondencia</h3>
      <div class="card_wrapper">
        <div class="payment_card light_green">
          <div class="card_header">
            <div class="amount">
              <span class="title">Entrante</span>
              <span class="amount_value">80</span>
            </div>
            <i class="fas fa-inbox icon dark_green"></i>
          </div>
          <span class="card_detail">Correspondencia Nueva</span>
        </div>
        <div class="payment_card light_red">
          <div class="card_header">
            <div class="amount">
              <span class="title">Pendientes</span>
              <span class="amount_value">10</span>
            </div>
            <i class="fas fa-business-time icon dark_red"></i>
          </div>
          <span class="card_detail"> Correspondencia recibida </span>
        </div>
        <div class="payment_card light_blue">
          <div class="card_header">
            <div class="amount">
              <span class="title">Enviados</span>
              <span class="amount_value">15</span>
            </div>
            <i class="fas fa-check icon dark_blue"></i>
          </div>
          <span class="card_detail"> Correspondencia respondida </span>
        </div>
        <div class="payment_card light_purple">
          <div class="card_header">
            <div class="amount">
              <span class="title">Archivo</span>
              <span class="amount_value">15</span>
            </div>
            <i class="fas fa-box-archive icon dark_purple"></i>
          </div>
          <span class="card_detail"> Correspondencia archivada </span>
        </div>
      </div>
    </div>
    <div
      class="flex-grow-1 card_container"
      [ngClass]="{ hidden: this.router.url != '/admin' }"
    >
      <app-grafico class="text-center"></app-grafico>
    </div>
    <div
      class="flex-grow-1 card_container"
      [ngClass]="{ hidden: this.router.url == '/admin' }"
    >
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
